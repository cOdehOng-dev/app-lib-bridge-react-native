name: Publish hongfield(릴리즈 배포)

# 트리거 1: master 브랜치 push → package.json version 변경 시에만 정식 배포
# 트리거 2: v* 태그 push (예: v1.0.0) → 태그 버전으로 정식 배포
on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  publish-release:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@codehong-dev'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # 태그 push면 태그에서 버전 파싱, 브랜치 push면 package.json version 사용
      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "SOURCE=tag" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
            echo "SOURCE=package.json" >> $GITHUB_OUTPUT
          fi

      # 이미 배포된 버전인지 확인 (master 브랜치 push 시 중복 배포 방지)
      - name: Check if version already published
        id: check
        run: |
          PUBLISHED=$(npm view @codehong-dev/hongfield@${{ steps.version.outputs.VERSION }} version --registry https://npm.pkg.github.com 2>/dev/null || echo "none")
          if [ "$PUBLISHED" = "${{ steps.version.outputs.VERSION }}" ]; then
            echo "SKIP=true" >> $GITHUB_OUTPUT
            echo "Version ${{ steps.version.outputs.VERSION }} already published, skipping."
          else
            echo "SKIP=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 태그 push일 때만 package.json 버전 동기화
      - name: Sync package.json version (tag only)
        if: steps.check.outputs.SKIP == 'false' && startsWith(github.ref, 'refs/tags/')
        run: npm version ${{ steps.version.outputs.VERSION }} --no-git-tag-version --allow-same-version

      # latest dist-tag로 정식 배포
      - name: Publish release
        if: steps.check.outputs.SKIP == 'false'
        run: npm publish --tag latest
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.SKIP }}" = "true" ]; then
            echo "## Skipped (already published)" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Released" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Version**: ${{ steps.version.outputs.VERSION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: ${{ steps.version.outputs.SOURCE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **dist-tag**: latest" >> $GITHUB_STEP_SUMMARY
