plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react'
    id 'maven-publish'
}

android {
    namespace 'com.bridgelib.lib'
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        minSdk rootProject.ext.minSdkVersion
        targetSdk rootProject.ext.targetSdkVersion

        buildConfigField("boolean", "IS_EDGE_TO_EDGE_ENABLED", properties["edgeToEdgeEnabled"] ?: "false").toString()
        buildConfigField("boolean", "IS_NEW_ARCHITECTURE_ENABLED", properties["newArchEnabled"] ?: "false").toString()
        buildConfigField("boolean", "IS_HERMES_ENABLED", properties["hermesEnabled"] ?: "true").toString()

        externalNativeBuild {
            cmake {
                arguments "-DANDROID_STL=c++_shared"
            }
        }
    }

    buildFeatures {
        buildConfig = true
        prefab true
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    externalNativeBuild {
        cmake {
            path "src/main/jni/CMakeLists.txt"
        }
    }

    packagingOptions {
        // These SOs are all provided by react-android (api dependency) and will be
        // present in the consumer app's APK. Bundling them in our AAR causes
        // DuplicateRelativeFileException and, worse, symbol-resolution split-brain
        // where javaModuleProvider is set in a different libreactnative.so instance
        // than the one the rest of RN uses.
        exclude 'lib/*/libc++_shared.so'
        exclude 'lib/*/libreactnative.so'
        exclude 'lib/*/libjsi.so'
        exclude 'lib/*/libfbjni.so'
    }

    publishing {
        multipleVariants {
            includeBuildTypeValues("debug", "release")
            allVariants()
        }
    }
}

dependencies {
    api("com.facebook.react:react-android:0.84.1")
    api("com.facebook.hermes:hermes-android:250829098.0.9")
    implementation 'androidx.appcompat:appcompat:1.7.0'
}

publishing {
    publications {
        mavenAar(MavenPublication) {
            groupId 'com.hong.lib'
            artifactId 'hongfield'
            version findProperty('libVersion') ?: '1.0.0'
            afterEvaluate {
                from(components.getByName("default"))
            }
            pom {
                withXml {
                    def dependenciesNode = asNode().get('dependencies')?.getAt(0)
                    if (dependenciesNode) {
                        dependenciesNode.children()
                            // Autolinked native modules are added as project dependencies (implementation project(':xxx'))
                            // and get rootProject.name as their Maven groupId when published.
                            // node_modules 에 버전 정보가 있으면 com.npm.rn:<pkg>:<ver> 로 교체하고,
                            // 없으면 제거한다 (내부 프로젝트 참조는 외부 Maven에서 해소 불가).
                            .findAll { it.groupId.text() == rootProject.name }
                            .each { dep ->
                                def pkgVersion = getNodeModulesVersion(dep.artifactId.text())
                                if (pkgVersion) {
                                    // dep.groupId / dep.version return NodeList; use [0] to get the Node and set its text value.
                                    dep.groupId[0].value = 'com.npm.rn'
                                    if (dep.version.size() > 0) {
                                        dep.version[0].value = pkgVersion
                                    } else {
                                        dep.appendNode('version', pkgVersion)
                                    }
                                } else {
                                    dependenciesNode.remove(dep)
                                }
                            }
                    }
                }
            }
        }
    }
    repositories {
        maven {
            name = 'Local'
            url = uri(findProperty('mavenRepoPath') ?: "${System.properties['user.home']}/.m2/repository")
        }
    }
}

// node_modules/<pkgName>/package.json 에서 version 을 읽는다.
// consumer 프로젝트(node_modules 존재) 외부에서 빌드하면 null 을 반환한다.
def getNodeModulesVersion(String pkgName) {
    try {
        def pkgJson = file("${rootProject.projectDir}/../node_modules/${pkgName}/package.json")
        if (!pkgJson.exists()) return null
        return new groovy.json.JsonSlurper().parse(pkgJson).version
    } catch (Exception ignored) {
        return null
    }
}

tasks.register("removeDependenciesFromModuleFile") {
    doLast {
        def moduleFile = file("${layout.buildDirectory.get()}/publications/mavenAar/module.json")
        if (moduleFile.exists()) {
            def json = new groovy.json.JsonSlurper().parse(moduleFile)
            json.variants?.each { variant ->
                variant.dependencies?.each { dep ->
                    if (dep.group == rootProject.name) {
                        // .module 파일에서도 POM 과 동일하게 com.npm.rn 으로 교체한다.
                        def pkgVersion = getNodeModulesVersion(dep.module as String)
                        if (pkgVersion) {
                            dep.group = 'com.npm.rn'
                            dep.version = [requires: pkgVersion]
                        }
                    }
                }
                // 버전을 확정하지 못한 내부 프로젝트 참조는 제거
                variant.dependencies?.removeAll { it.group == rootProject.name }
            }
            moduleFile.text = groovy.json.JsonOutput.prettyPrint(
                groovy.json.JsonOutput.toJson(json))
        }
    }
}

tasks.named("generateMetadataFileForMavenAarPublication") {
    finalizedBy("removeDependenciesFromModuleFile")
}
